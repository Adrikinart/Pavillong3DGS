# STEP 3: multi-clip at the capacity optimum.
#
# The third candidate was "a clip that re-observes the same surfaces", but the only
# unused clip (IMG_9648) does not reconstruct, so that needs new footage rather than
# new code. The executable version of the same question is: does the merge become
# competitive once capacity is set correctly?
#
# Measured on the multi-clip dataset: 3.0M -> 21.36, 1.5M -> 22.03, 750k -> 22.37.
# Monotonically better as capacity falls, and the single-clip optimum was 375k. This
# completes that curve. If the merge is only losing because a larger volume was
# over-parameterised, it should close much of the ~1 dB gap; if it plateaus, the
# deficit is genuinely about which surfaces the extra views observe.
#
object_name: pavillon_multiclip
capture_mode: orbit
profile:
  name: rtxpro
  nodelist: GPURACK2
videos:
  - /home/AdrienK/Datasets/VideosForNVSpersonnal/Pavillon/IMG_9647.MOV
  - /home/AdrienK/Datasets/VideosForNVSpersonnal/Pavillon/IMG_9649.MOV

extract_frames:
  strategy: fixed_fps
  target_fps: 3.0
  max_frames: 520              # across BOTH clips
  min_frames: 80
  resize_long_edge: 2560

filter_frames:
  enabled: true
  blur_var_min: 50.0           # now measured at a fixed reference scale

generate_masks:
  enabled: false

run_colmap:
  matcher: exhaustive          # cross-clip pairs are essential to link the clips
  mapper_backend: glomap
  camera_model: OPENCV
  single_camera: false         # two clips -> allow per-clip intrinsics
  sequential_overlap: 15

validate_colmap:
  minimum_registration_ratio: 0.50   # merging clips is harder; warn, don't fail
  hard_fail: false

normalize_scene:
  method: points

split_dataset:
  strategy: pose_aware

train:
  backend: gsplat
  train_run_id: gsplat_multiclip_cap375k
  max_iterations: 30000
  sh_degree: 3
  use_masks: false
  antialiasing: true
  checkpoint_interval: 5000
  validation_interval: 1000
  val_render_count: 4
  # --- the point of this run ---
  appearance_embedding: true
  appearance_dim: 16
  appearance_lr: 1.0e-3
  densification:
    strategy: default
    start_iteration: 500
    stop_iteration: 15000
    interval: 100
    grad_threshold: 0.0003
    opacity_reset_interval: 3000
    prune_opacity: 0.005
    cap_max: 375000
  bounds:
    enabled: true
    margin: 0.5
    prune_every: 500
  floater:
    enabled: true
    max_scale_frac: 0.15
    min_opacity: 0.005
    prune_every: 500
  depth_prior:
    enabled: true
    model: depth-anything/Depth-Anything-V2-Small-hf
    lambda_depth: 0.1
    start_iter: 2000
    loss: pearson

report:
  enabled: true
  figures: [training_curves, qualitative, gaussian_stats, per_view, gaussian_centers]
  videos: [orbit, progression]
  orbit_frames: 150
  orbit_elevation_deg: 15.0
  video_fps: 30
