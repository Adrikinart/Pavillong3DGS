# Smallest meaningful end-to-end run. Verifies the whole pipeline quickly on a
# single Pavillon clip: few downscaled frames, short training, frequent val/ckpt.
object_name: pavillon_smoke
capture_mode: orbit
profile:
  name: rtxpro
  nodelist: GPURACK5
videos:
  # IMG_9647 is the fuller 196s 4K orbit: reconstructs reliably (85 imgs registered,
  # 0.52px reproj in testing). IMG_9648 is a weakly-connected walking shot that does
  # NOT reconstruct — do not use it for the smoke.
  - /home/AdrienK/Datasets/VideosForNVSpersonnal/Pavillon/IMG_9647.MOV

extract_frames:
  strategy: fixed_fps
  target_fps: 1.0          # ~196s clip -> ~140 frames (capped) with good overlap
  max_frames: 140
  min_frames: 40
  resize_long_edge: 1400

filter_frames:
  enabled: true
  blur_var_min: 40.0
  min_kept: 20

generate_masks:
  enabled: false

run_colmap:
  matcher: sequential
  camera_model: OPENCV
  single_camera: true
  use_gpu: false
  sequential_overlap: 10

validate_colmap:
  # sequential matching reliably registers ~46/126 here (0.36); accept that so the
  # smoke doesn't depend on COLMAP's nondeterministic exhaustive pass.
  minimum_registration_ratio: 0.30
  minimum_sparse_points: 300
  hard_fail: false

normalize_scene:
  method: points

split_dataset:
  strategy: periodic
  holdout_every: 6

train:
  backend: gsplat
  max_iterations: 1500
  image_downscale: 1
  sh_degree: 1
  use_masks: false
  checkpoint_interval: 500
  validation_interval: 500
  val_render_count: 2
  densification:
    start_iteration: 200
    stop_iteration: 1000
    interval: 100
    cap_max: 300000

evaluate:
  splits: [test]
  compute_lpips: true
  make_orbit_video: false

report:
  enabled: true
  figures: [training_curves, qualitative, gaussian_stats, per_view, gaussian_centers]
  videos: [orbit, progression]
  orbit_frames: 30           # small/fast for the smoke
  orbit_width: 640
  orbit_height: 360
  video_fps: 20

monitoring:
  gpu_sample_interval_s: 5.0
