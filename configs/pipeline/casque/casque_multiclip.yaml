# Casque -- MULTI-CLIP coverage: the real quality lever.
# The single-clip helmet was data-limited (136 usable frames after 66% blur rejection),
# and concentrating the budget via an object box did NOT help. Adding the pro clips and
# the long iPhone orbit adds genuine angles; appearance embeddings reconcile the
# pro-vs-iPhone colour response (the mechanism validated on the Pavillon merge).
object_name: casque_multiclip
capture_mode: orbit
profile:
  name: rtxpro
  nodelist: GPURACK2
videos:
  - "/home/AdrienK/Datasets/VideosForNVSpersonnal/casque saint georges doudou/IMG_8281.MOV"   # 4K iphone
  - "/home/AdrienK/Datasets/VideosForNVSpersonnal/casque saint georges doudou/102A2544.MOV"   # pro 183s
  - "/home/AdrienK/Datasets/VideosForNVSpersonnal/casque saint georges doudou/102A2545.MOV"   # pro 133s
  - "/home/AdrienK/Datasets/VideosForNVSpersonnal/casque saint georges doudou/IMG_8280.MOV"   # iphone 420s

extract_frames:
  strategy: fixed_fps
  target_fps: 3.0
  max_frames: 900            # 4 clips: more angles = more coverage (the real lever)
  min_frames: 80
  resize_long_edge: 2560     # Pavillon lesson: keep native detail (pro camera is 4K+)

filter_frames:
  enabled: true
  blur_var_min: 50.0         # now measured at a fixed reference scale (resolution-safe)

generate_masks:
  enabled: false

run_colmap:
  matcher: exhaustive        # orbit + multi-source: no single temporal ordering
  mapper_backend: glomap     # robust global SfM (2.2x registration on the Pavillon)
  camera_model: OPENCV
  single_camera: false       # pro camera + iPhone have different intrinsics
  use_masks: false           # use the checkerboard + room: the helmet has few features
  sequential_overlap: 15

validate_colmap:
  minimum_registration_ratio: 0.60
  hard_fail: false

normalize_scene:
  method: cameras            # object-centric: camera ring defines the frame

split_dataset:
  strategy: pose_aware

train:
  backend: gsplat
  train_run_id: casque_multiclip
  max_iterations: 30000
  sh_degree: 3
  use_masks: false           # full scene; isolate the helmet at export (crop)
  antialiasing: true
  checkpoint_interval: 5000
  validation_interval: 1000
  # Two cameras with different colour response -> reconcile with per-image latents.
  # This is the mechanism validated on the Pavillon multi-clip merge.
  appearance_embedding: true   # reconcile pro-vs-iPhone colour response (the built+validated mechanism)
  appearance_model: affine   # try bilateral only if vignetting/spatial response appears
  densification:
    strategy: mcmc           # explicit budget target; no grad_threshold to tune
    start_iteration: 500
    stop_iteration: 15000
    interval: 100
    prune_opacity: 0.005
    cap_max: 1500000         # good coverage -> more capacity than the Pavillon's 375k;
    noise_lr: 5.0e5          #   run a short capacity probe (see docs/reproduce_casque.md)
  bounds:
    enabled: true
    margin: 0.5
    # NOTE: an explicit tight box (box_center/box_half_extent) was tested to focus the
    # budget on the helmet. It HURT (added boundary smearing, no sharper helmet): the
    # helmet is data-limited, not budget-limited, and with masks off the box fights the
    # photometric loss over the visible background. Isolate the helmet by CROPPING at
    # export instead (scripts crop the .ply/mesh to the object box). Box kept as a
    # feature for genuinely mask-separable objects.
  floater:
    enabled: true
    max_scale_frac: 0.15
    min_opacity: 0.005
  # Good multi-view coverage makes the depth prior less critical, but it is cheap.
  depth_prior:
    enabled: true
    model: depth-anything/Depth-Anything-V2-Small-hf
    lambda_depth: 0.1
    start_iter: 2000
    loss: pearson
  # Cleaner surface for the mesh export (helped the Pavillon mesh: coherence 0.81->0.92)
  normal_consistency:
    enabled: true
    lambda_normal: 0.05
    start_iter: 7000

report:
  enabled: true
  figures: [training_curves, qualitative, gaussian_stats, per_view, gaussian_centers]
  videos: [orbit, progression]
  orbit_frames: 180
  orbit_arc_deg: 360.0       # a real orbit -> full turntable video, not a front arc
  orbit_elevation_deg: 15.0
  video_fps: 30
