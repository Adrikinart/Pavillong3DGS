# Casque Saint-Georges — object-centric orbit reconstruction.
#
# This capture is the OPPOSITE of the Pavillon on almost every axis, so several
# hard-won Pavillon settings are deliberately inverted here:
#
#   Pavillon (scene)                     Casque (object)
#   -----------------------------------  -----------------------------------------
#   single-sided, low parallax           full ORBIT, high parallax  -> more capacity OK
#   relief carved INTO a wall            free-standing helmet       -> isolate in 3D (crop)
#   one iPhone clip                      pro camera + iPhone        -> appearance embeds
#   2DGS failed (no multi-view normals)  multi-view surface         -> 2DGS should WORK
#   cap_max 375k optimal (overfitting)   good coverage              -> 1.5M MEASURED optimal
#
# Kept from the Pavillon: normal-consistency (cleaner mesh) and the anti-floater prune.
# The helmet is isolated SPATIALLY (crop box / tight train.bounds) rather than by a
# mask -- see the generate_masks note below for why. An attractive object box is a
# sensible refinement here, since the helmet is separable in 3D.
object_name: casque_orbit
capture_mode: orbit
profile:
  name: rtxpro
  nodelist: GPURACK2
# Pro camera (102A25xx) + iPhone (IMG_8xxx) orbits. Curate to the clean full orbits;
# short/hand-held establishing clips can hurt. Verify each with `inspect-video`.
# Footage survey: the "pro" clips (102A25xx) are only 1080p; IMG_8281 is the single
# 4K clip (3840x2160, 154s orbit) and the detail winner. Start from it ALONE for a
# clean baseline (the Pavillon lesson), then add clips + appearance for coverage.
videos:
  - "/home/AdrienK/Datasets/VideosForNVSpersonnal/casque saint georges doudou/IMG_8281.MOV"

extract_frames:
  strategy: fixed_fps
  target_fps: 3.0
  max_frames: 400            # across all clips; orbit coverage is the point
  min_frames: 80
  resize_long_edge: 2560     # Pavillon lesson: keep native detail (pro camera is 4K+)

filter_frames:
  enabled: true
  blur_var_min: 50.0         # now measured at a fixed reference scale (resolution-safe)

# Masking is OFF, deliberately, and this is the opposite of what "I only want the
# helmet" first suggests. A mask-gate test showed two things: (1) rembg is unreliable
# on this subject -- chrome reflections, a wispy horsehair plume and a competing stand
# make salient-object segmentation swing from 0.1% to 45% of the frame across the
# orbit; (2) the scene contains a CHECKERBOARD calibration target, which is the best
# SfM feature source present, while the chrome helmet itself has almost no stable
# features. Masking would discard exactly the features that give accurate poses. So we
# reconstruct the FULL scene (great registration) and isolate the free-standing helmet
# SPATIALLY afterwards (crop box / tight train.bounds) -- which works here precisely
# because, unlike the wall-embedded Pavillon relief, the helmet is separable in 3D.
generate_masks:
  enabled: false

run_colmap:
  matcher: exhaustive        # orbit + multi-source: no single temporal ordering
  mapper_backend: glomap     # robust global SfM (2.2x registration on the Pavillon)
  camera_model: OPENCV
  single_camera: true        # single clip to start; false when mixing cameras
  use_masks: false           # use the checkerboard + room: the helmet has few features
  sequential_overlap: 15

validate_colmap:
  minimum_registration_ratio: 0.60
  hard_fail: false

normalize_scene:
  method: cameras            # object-centric: camera ring defines the frame

split_dataset:
  strategy: pose_aware

train:
  backend: gsplat
  train_run_id: casque_gsplat
  max_iterations: 30000
  sh_degree: 3
  use_masks: false           # full scene; isolate the helmet at export (crop)
  antialiasing: true
  checkpoint_interval: 5000
  validation_interval: 1000
  # Two cameras with different colour response -> reconcile with per-image latents.
  # This is the mechanism validated on the Pavillon multi-clip merge.
  appearance_embedding: false  # single clip; turn ON when adding the pro/other clips
  appearance_model: affine   # try bilateral only if vignetting/spatial response appears
  densification:
    strategy: mcmc           # explicit budget target; no grad_threshold to tune
    start_iteration: 500
    stop_iteration: 15000
    interval: 100
    prune_opacity: 0.005
    # MEASURED optimum for this capture, with the depth prior OFF (13 test views):
    #   750k 19.84 | 1.5M 21.25 | 3M 22.15 | 6M 23.41 | 12M 23.27 dB
    #   750k ->  1.5M  +1.41 dB CI [+0.81, +2.01]  12/13  significant
    #   1.5M ->   3M   +0.90 dB CI [+0.41, +1.39]  11/13  significant
    #     3M ->   6M   +1.26 dB CI [+0.35, +2.18]  12/13  significant
    #     6M ->  12M   -0.14 dB CI [-0.69, +0.41]   7/13  TIE  <- the curve finally flattens
    # So 6M is the operating point: 12M is statistically tied and twice the size.
    #
    # This INVERTS the Pavillon's 375k optimum by 16x. An orbit supplies real parallax, so
    # surplus primitives are constrained by multi-view evidence rather than free to overfit.
    # Note we first measured a plateau at 1.5M -- that was an artifact of the depth prior,
    # whose damage grows with capacity and flattened the top of the curve. Settle the rest
    # of the config BEFORE sweeping. Re-sweep per capture; see scripts/capacity_curve.py.
    #
    # Cost of this choice: ~5.3M Gaussians, a 3.8 GB checkpoint. If storage or render speed
    # matters more than the last decibel, 1.5M (973 MB) gives up ~2.2 dB.
    cap_max: 6000000
    noise_lr: 5.0e5
  bounds:
    enabled: true
    margin: 0.5
    # NOTE: an explicit tight box (box_center/box_half_extent) was tested to focus the
    # budget on the helmet. It HURT (added boundary smearing, no sharper helmet): the
    # helmet is data-limited, not budget-limited, and with masks off the box fights the
    # photometric loss over the visible background. Isolate the helmet by CROPPING at
    # export instead (scripts crop the .ply/mesh to the object box). Box kept as a
    # feature for genuinely mask-separable objects.
  floater:
    enabled: true
    max_scale_frac: 0.15
    min_opacity: 0.005
  # The monocular depth prior is OFF here, and that is a measured decision that reverses
  # what we assumed. Ablation on this capture (13 test views, everything else identical):
  #   depth ON  20.35 dB / 0.8636 / 0.2710
  #   depth OFF 21.25 dB / 0.8664 / 0.2586
  #   paired +0.89 dB, 95% CI [+0.28, +1.51], 9/13 views -> SIGNIFICANT, better on all three
  # We had carried "nearly free, low impact" over from the Pavillon. It is not free here:
  # it costs ~0.9 dB. The likely mechanism is specularity. DepthAnything is trained on
  # ordinary photographs, and on a mirror-like surface it reports the depth of the
  # REFLECTED scene rather than of the surface -- so on a chrome helmet the prior supplies
  # confidently wrong targets exactly where photometric supervision is already hardest.
  # An orbit also supplies real parallax, so there is little the prior could add even if
  # it were right. Keep it ON for sparse-view, low-parallax, matte captures (the Pavillon).
  depth_prior:
    enabled: false
    model: depth-anything/Depth-Anything-V2-Small-hf
    lambda_depth: 0.1
    start_iter: 2000
    loss: pearson
  # Cleaner surface for the mesh export (helped the Pavillon mesh: coherence 0.81->0.92)
  normal_consistency:
    enabled: true
    lambda_normal: 0.05
    start_iter: 7000

report:
  enabled: true
  figures: [training_curves, qualitative, gaussian_stats, per_view, gaussian_centers]
  videos: [orbit, progression]
  orbit_frames: 180
  orbit_arc_deg: 360.0       # a real orbit -> full turntable video, not a front arc
  orbit_elevation_deg: 15.0
  video_fps: 30
