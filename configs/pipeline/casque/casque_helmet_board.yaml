# Casque Saint-Georges -- HELMET-ONLY deliverable.
#
# Use this config when the subject is the product and the room is not. It differs from
# casque.yaml in one decision with large consequences: the training loss is restricted to
# the helmet, via masks projected from a 3D volume after SfM.
#
# Why that is worth a separate config (all measured on this capture, 13 held-out views):
#
#   full-frame loss   750k 19.84 | 1.5M 21.25 | 3M 22.15 | 6M 23.41 dB
#                     every doubling significant up to 6M -> needs ~5.3M Gaussians, 3.8 GB
#   masked loss       190k 22.81 | 375k 23.10 | 750k 23.03 | 1.5M 22.96 | 6M 23.06 dB
#                     EVERY step a tie across 32x -> 190-375k is enough, ~50 MB
#
# The capacity was never being spent on the helmet; it was spent reproducing an auditorium
# seen across 310 degrees of azimuth. Masking the loss gives a ~30x smaller model at no
# measurable cost. See docs/technique_transfer.md.
#
# NOTE the masks are applied to the LOSS ONLY, never to SfM. Masking before SfM would throw
# away the checkerboard, which carries nearly all the reliable features on this capture
# while the chrome helmet has almost none -- that is why generate_masks stays disabled and
# a separate object_masks stage (which runs after normalize_scene, when poses exist) does
# the work instead.
object_name: casque_orbit          # SHARE the dataset dir: reuses the existing SfM
capture_mode: orbit
profile:
  name: rtxpro
videos:
  - "/home/AdrienK/Datasets/VideosForNVSpersonnal/casque saint georges doudou/IMG_8281.MOV"

extract_frames:
  strategy: fixed_fps
  target_fps: 3.0
  max_frames: 400
  min_frames: 80
  resize_long_edge: 2560

filter_frames:
  enabled: true
  blur_var_min: 50.0

# Off, deliberately: see the header. The subject is isolated AFTER SfM, not before.
generate_masks:
  enabled: false

run_colmap:
  matcher: exhaustive
  mapper_backend: glomap
  camera_model: OPENCV
  single_camera: true
  use_masks: false
  sequential_overlap: 15

validate_colmap:
  minimum_registration_ratio: 0.60
  hard_fail: false

normalize_scene:
  method: cameras

# Project the subject volume into every view. `mesh` follows the real silhouette (median
# 29% of frame here); `box` is self-contained but much looser (59%), because a cube in
# perspective projects to a hexagon far larger than the object inside it.
#
# The mesh below is produced by this project: run casque_2dgs.yaml, then
#   python scripts/crop_object.py exports/casque_2dgs_nodist/mesh.ply \
#          exports/casque_2dgs_nodist/mesh_helmet.ply \
#          --center -0.183 0.166 0.220 --half-extent 0.24
# For a cold start with no mesh yet, switch to:
#   source: box, box_center: [-0.183, 0.166, 0.220], box_half_extent: 0.24
# The centre is not guessed: it is where all the optical axes converge, which on an orbit
# IS the subject (see reporting/cameras.py::capture_geometry). Deriving it from the point
# cloud instead would land on the checkerboard, which has the features the helmet lacks.
#
# To keep the checkerboard base in the deliverable, raise box_half_extent (~0.35) or
# increase dilate_px; the helmet-only numbers above were measured with the mesh.
# Helmet PLUS its checkerboard base. A box rather than the helmet mesh, because the board
# is not in that mesh; half_extent 0.35 (vs the helmet's 0.24) reaches down to the board.
# This is also a test of the scene-content finding: if capacity tracks how much observed
# scene the loss must reproduce, enlarging the masked area should make capacity matter again.
object_masks:
  enabled: true
  source: box
  box_center: [-0.183, 0.166, 0.220]
  box_half_extent: 0.35
  dilate_px: 8
  min_area_fraction: 0.10        # warn if the volume projects to less than 10% of frame

split_dataset:
  strategy: pose_aware

train:
  backend: gsplat
  train_run_id: casque_board
  max_iterations: 30000
  sh_degree: 3
  use_masks: true                # the whole point of this config
  antialiasing: true
  checkpoint_interval: 5000
  validation_interval: 1000
  appearance_embedding: false    # single clip: measured a tie (-0.09 dB, CI [-0.60,+0.41])
  densification:
    strategy: mcmc
    start_iteration: 500
    stop_iteration: 15000
    interval: 100
    prune_opacity: 0.005
    # 375k sits at the top of a curve that is FLAT from 190k to 6M, so this is the cheap
    # end of a plateau rather than a tuned optimum. Do not copy it to an unmasked run.
    cap_max: 375000
    noise_lr: 5.0e5
  bounds:
    enabled: true
    margin: 0.5
  floater:
    enabled: true
    max_scale_frac: 0.15
    min_opacity: 0.005
  # OFF: measured -0.89 dB on this capture. DepthAnything reports the depth of the
  # REFLECTED scene on a mirror-like surface, so a chrome helmet gets confidently wrong
  # targets exactly where photometric supervision is weakest.
  depth_prior:
    enabled: false
  normal_consistency:
    enabled: true
    lambda_normal: 0.05
    start_iter: 7000

report:
  enabled: true
  figures: [training_curves, qualitative, gaussian_stats, per_view, gaussian_centers]
  videos: [orbit, progression]
  orbit_frames: 180
  orbit_arc_deg: 360.0
  orbit_elevation_deg: 15.0
  orbit_radius_scale: 1.7
  object_crop_scale: 0.5
  video_fps: 30
