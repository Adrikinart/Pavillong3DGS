# Casque Saint-Georges — SURFACE MESH via 2D Gaussian Splatting.
#
# 2DGS FAILED on the Pavillon (13 dB) because a surface-aligned disk must recover an
# orientation that a single-sided capture never observes. The Casque is a full ORBIT
# of a curved object: exactly the multi-view surface coverage 2DGS needs. This is the
# capture where 2DGS is expected to shine and to yield the cleanest helmet mesh.
# If it underperforms 3DGS+TSDF here too, that is a strong signal about the footage,
# not the method. Otherwise identical to casque.yaml (masks, appearance, GLOMAP).
#
object_name: casque_orbit_2dgs
capture_mode: orbit
profile:
  name: rtxpro
  nodelist: GPURACK2
videos:
  - "/home/AdrienK/Datasets/VideosForNVSpersonnal/casque saint georges doudou/102A2544.MOV"
  - "/home/AdrienK/Datasets/VideosForNVSpersonnal/casque saint georges doudou/102A2545.MOV"
  - "/home/AdrienK/Datasets/VideosForNVSpersonnal/casque saint georges doudou/IMG_8280.MOV"
  - "/home/AdrienK/Datasets/VideosForNVSpersonnal/casque saint georges doudou/IMG_8281.MOV"

extract_frames:
  strategy: fixed_fps
  target_fps: 3.0
  max_frames: 400            # across all clips; orbit coverage is the point
  min_frames: 80
  resize_long_edge: 2560     # Pavillon lesson: keep native detail (pro camera is 4K+)

filter_frames:
  enabled: true
  blur_var_min: 50.0         # now measured at a fixed reference scale (resolution-safe)

generate_masks:
  enabled: true
  backend: rembg             # salient-object; switch to sam2 if the helmet is not salient
  dilate_px: 6
  minimum_area_fraction: 0.05
  manual_review: true        # verify a few masks before committing a long run

run_colmap:
  matcher: exhaustive        # orbit + multi-source: no single temporal ordering
  mapper_backend: glomap     # robust global SfM (2.2x registration on the Pavillon)
  camera_model: OPENCV
  single_camera: false       # pro camera and iPhone have DIFFERENT intrinsics
  use_masks: true            # mask-only features: ignore the environment
  sequential_overlap: 15

validate_colmap:
  minimum_registration_ratio: 0.60
  hard_fail: false

normalize_scene:
  method: cameras            # object-centric: camera ring defines the frame

split_dataset:
  strategy: pose_aware

train:
  backend: 2dgs
  train_run_id: casque_2dgs
  max_iterations: 30000
  sh_degree: 3
  use_masks: true            # supervise only the helmet
  antialiasing: true
  checkpoint_interval: 5000
  validation_interval: 1000
  # Two cameras with different colour response -> reconcile with per-image latents.
  # This is the mechanism validated on the Pavillon multi-clip merge.
  appearance_embedding: true
  appearance_model: affine   # try bilateral only if vignetting/spatial response appears
  densification:
    strategy: default        # 2DGS uses gradient_2dgs densification internally
    start_iteration: 500
    stop_iteration: 15000
    interval: 100
    grad_threshold: 0.0002
    prune_opacity: 0.05
    cap_max: 1500000
  bounds:
    enabled: true
    margin: 0.5
  floater:
    enabled: true
    max_scale_frac: 0.15
    min_opacity: 0.005
  # Good multi-view coverage makes the depth prior less critical, but it is cheap.
  depth_prior:
    enabled: true
    model: depth-anything/Depth-Anything-V2-Small-hf
    lambda_depth: 0.1
    start_iter: 2000
    loss: pearson
  # Cleaner surface for the mesh export (helped the Pavillon mesh: coherence 0.81->0.92)
  normal_consistency:
    enabled: false           # 2DGS has its own normal-consistency + distortion terms
  backend_opts:
    normal_lambda: 0.05
    dist_lambda: 1.0
    normal_start_iter: 7000
    dist_start_iter: 7000

report:
  enabled: true
  figures: [training_curves, qualitative, gaussian_stats, per_view, gaussian_centers]
  videos: [orbit, progression]
  orbit_frames: 180
  orbit_arc_deg: 360.0       # a real orbit -> full turntable video, not a front arc
  orbit_elevation_deg: 15.0
  video_fps: 30
