# High-fidelity Pavillon reconstruction from the SINGLE best orbit (IMG_9647).
#
# Rationale: the 3-clip scene_pavillon merges three iPhone orbits with different
# auto-exposure/white-balance. Without per-image appearance embeddings the model
# can't reconcile them, residual gradients stay high everywhere, densification
# runs away (~1.1M gaussians -> fog) and PSNR plateaus ~14. A single consistent
# orbit avoids that entirely (IMG_9647 alone reached ~19.6 PSNR in the smoke) and
# gives a clean, sharp reconstruction. Trade-off: single-orbit coverage.
object_name: pavillon_orbit
capture_mode: orbit
profile:
  name: rtxpro
  nodelist: GPURACK5
videos:
  - /home/AdrienK/Datasets/VideosForNVSpersonnal/Pavillon/IMG_9647.MOV

extract_frames:
  strategy: fixed_fps
  target_fps: 2.0
  max_frames: 260
  min_frames: 60
  resize_long_edge: 1600

filter_frames:
  enabled: true
  blur_var_min: 50.0

generate_masks:
  enabled: false

run_colmap:
  matcher: exhaustive        # low overlap -> match all pairs
  mapper_backend: glomap     # global SfM: 181/193 registered vs 82 for incremental COLMAP
  camera_model: OPENCV
  single_camera: true        # one clip, one camera -> shared intrinsics
  sequential_overlap: 15

validate_colmap:
  minimum_registration_ratio: 0.60
  hard_fail: false

normalize_scene:
  method: points

split_dataset:
  strategy: pose_aware

train:
  backend: gsplat
  max_iterations: 30000
  sh_degree: 3
  use_masks: false
  antialiasing: true
  checkpoint_interval: 5000
  validation_interval: 1000
  val_render_count: 4
  densification:
    strategy: default
    start_iteration: 500
    stop_iteration: 15000
    interval: 100
    grad_threshold: 0.0003
    opacity_reset_interval: 3000
    prune_opacity: 0.005
    cap_max: 1500000

report:
  enabled: true
  figures: [training_curves, qualitative, gaussian_stats, per_view, gaussian_centers]
  videos: [orbit, progression]
  orbit_frames: 150
  orbit_elevation_deg: 15.0
  video_fps: 30
