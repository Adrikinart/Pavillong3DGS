# STEP 1: depth-normal consistency on top of the best model (cap 375k, ADC).
#
# 2DGS failed on this capture (13.3 dB) because a surface-aligned primitive must
# RECOVER an orientation that a single-sided capture never observes. This is the same
# geometric idea applied as a SOFT self-consistency term to ordinary 3D Gaussians:
# the normal implied by each Gaussian's shortest axis, composited into a normal map,
# is compared against the normal implied by the model's own rendered depth. Both come
# from the same model by different routes, so agreement forces primitives to lie
# ALONG the surface they collectively render - no external evidence needed, which is
# why it can work where 2DGS's hard constraint could not.
#
# Ramped in at iteration 7000 so coarse geometry forms before it is aligned.
# Everything else is identical to cap375k, so the term is the only variable.
#
object_name: pavillon_hidetail
capture_mode: orbit
profile:
  name: rtxpro
  nodelist: GPURACK2
videos:
  - /home/AdrienK/Datasets/VideosForNVSpersonnal/Pavillon/IMG_9647.MOV

extract_frames:
  strategy: fixed_fps
  target_fps: 4.0
  max_frames: 400
  min_frames: 60
  resize_long_edge: 2560       # source is 3840x2160; keep the fine carving

filter_frames:
  enabled: true
  blur_var_min: 50.0

generate_masks:
  enabled: false

run_colmap:
  matcher: exhaustive
  mapper_backend: glomap       # 181/193 vs 82 for incremental COLMAP on this capture
  camera_model: OPENCV
  single_camera: true
  sequential_overlap: 15

validate_colmap:
  minimum_registration_ratio: 0.60
  hard_fail: false

normalize_scene:
  method: points

split_dataset:
  strategy: pose_aware

train:
  backend: gsplat
  train_run_id: gsplat_hidetail_normal
  max_iterations: 30000
  sh_degree: 3
  use_masks: false
  antialiasing: true
  checkpoint_interval: 5000
  validation_interval: 1000
  val_render_count: 4
  densification:
    strategy: default
    start_iteration: 500
    stop_iteration: 15000
    interval: 100
    grad_threshold: 0.0003
    opacity_reset_interval: 3000
    prune_opacity: 0.005
    # Kept at the A3 run's value so resolution/frame-count/min_opacity are the only
    # changed variables (clean comparison), and so the run fits a 16 GB card.
    cap_max: 375000
  bounds:
    enabled: true
    margin: 0.5
    prune_every: 500
  floater:
    enabled: true
    max_scale_frac: 0.15
    min_opacity: 0.005         # was 0.02 — the measured PSNR cost
    prune_every: 500
  normal_consistency:
    enabled: true
    lambda_normal: 0.05
    start_iter: 7000
    alpha_min: 0.5
  depth_prior:
    enabled: true              # ~free in PSNR and it increases floater removal
    model: depth-anything/Depth-Anything-V2-Small-hf
    lambda_depth: 0.1
    start_iter: 2000
    loss: pearson

report:
  enabled: true
  figures: [training_curves, qualitative, gaussian_stats, per_view, gaussian_centers]
  videos: [orbit, progression]
  orbit_frames: 150
  orbit_elevation_deg: 15.0
  video_fps: 30
