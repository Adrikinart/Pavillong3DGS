# STEP 2: bilateral-grid appearance on the multi-clip merge.
#
# The affine appearance model applies ONE 3x3 matrix and bias to every pixel. That is
# provably unable to encode geometry (it commutes with any pixel permutation) but it
# also cannot represent anything spatially varying - vignetting, or a response that
# differs across the frame. The bilateral grid (Wang et al., SIGGRAPH 2024; now the
# Nerfstudio default) gives each image a coarse (x, y, luma) grid of affine
# transforms, sliced per pixel.
#
# It is tested on the MULTI-CLIP dataset because that is where appearance actually
# varies; on a single clip there is nothing for it to correct. Capacity is set to
# 750k, the best point measured for this dataset. A total-variation penalty keeps the
# grid smooth: it is more expressive than the affine map, so its capacity bound is
# weaker and worth constraining.
#
object_name: pavillon_multiclip
capture_mode: orbit
profile:
  name: rtxpro
  nodelist: GPURACK2
videos:
  - /home/AdrienK/Datasets/VideosForNVSpersonnal/Pavillon/IMG_9647.MOV
  - /home/AdrienK/Datasets/VideosForNVSpersonnal/Pavillon/IMG_9649.MOV

extract_frames:
  strategy: fixed_fps
  target_fps: 3.0
  max_frames: 520              # across BOTH clips
  min_frames: 80
  resize_long_edge: 2560

filter_frames:
  enabled: true
  blur_var_min: 50.0           # now measured at a fixed reference scale

generate_masks:
  enabled: false

run_colmap:
  matcher: exhaustive          # cross-clip pairs are essential to link the clips
  mapper_backend: glomap
  camera_model: OPENCV
  single_camera: false         # two clips -> allow per-clip intrinsics
  sequential_overlap: 15

validate_colmap:
  minimum_registration_ratio: 0.50   # merging clips is harder; warn, don't fail
  hard_fail: false

normalize_scene:
  method: points

split_dataset:
  strategy: pose_aware

train:
  backend: gsplat
  train_run_id: gsplat_multiclip_bilateral
  max_iterations: 30000
  sh_degree: 3
  use_masks: false
  antialiasing: true
  checkpoint_interval: 5000
  validation_interval: 1000
  val_render_count: 4
  # --- the point of this run ---
  appearance_embedding: true
  appearance_dim: 16
  appearance_model: bilateral
  bilateral_grid_wh: 16
  bilateral_grid_luma: 8
  bilateral_tv_lambda: 10.0
  appearance_lr: 1.0e-3
  densification:
    strategy: default
    start_iteration: 500
    stop_iteration: 15000
    interval: 100
    grad_threshold: 0.0003
    opacity_reset_interval: 3000
    prune_opacity: 0.005
    cap_max: 750000
  bounds:
    enabled: true
    margin: 0.5
    prune_every: 500
  floater:
    enabled: true
    max_scale_frac: 0.15
    min_opacity: 0.005
    prune_every: 500
  depth_prior:
    enabled: true
    model: depth-anything/Depth-Anything-V2-Small-hf
    lambda_depth: 0.1
    start_iter: 2000
    loss: pearson

report:
  enabled: true
  figures: [training_curves, qualitative, gaussian_stats, per_view, gaussian_centers]
  videos: [orbit, progression]
  orbit_frames: 150
  orbit_elevation_deg: 15.0
  video_fps: 30
