# Cluster profile: rtxpro partition (RTX PRO 4500 / RTX PRO 6000 Blackwell).
# GPURACK5 (RTX PRO 6000, ~96 GB) is the preferred smoke-test / heavy node.
profile:
  name: rtxpro
  scheduler: slurm
  partition: rtxpro
  nodelist: GPURACK5
  gpu_type: RTX_PRO_6000
  cuda_arch: "12.0"      # sm_120 (Blackwell)
  torch_cuda: cu128
  gpus: 1
  cpus_per_task: 16
  memory_gb: 64
  time_limit: "24:00:00"
  signal_before_timeout_seconds: 120
  requeue: true
  env_prefix: /home/${USER}/envs/v2gs
