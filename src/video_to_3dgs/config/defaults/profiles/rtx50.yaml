# Cluster profile: rtx50 partition (2x RTX 5080 Blackwell, 16 GB each).
profile:
  name: rtx50
  scheduler: slurm
  partition: rtx50
  nodelist: GPURACK4
  gpu_type: RTX_5080
  cuda_arch: "12.0"      # sm_120 (Blackwell)
  torch_cuda: cu128
  gpus: 1
  cpus_per_task: 12
  memory_gb: 48
  time_limit: "24:00:00"
  signal_before_timeout_seconds: 120
  requeue: true
  env_prefix: /home/${USER}/envs/v2gs
